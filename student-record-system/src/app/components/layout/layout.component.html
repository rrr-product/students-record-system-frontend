<div class="layout-wrapper">
  <div class="card">
    <p-menubar [model]="menuItems">
      <ng-template #start>
        <div class="logo mr-4 cursor-pointer" (click)="router.navigate(['/dashboard'])">
          <i class="pi pi-graduation-cap text-primary" style="font-size: 1.8rem"></i>
          <h2 class="ml-2 m-0 text-primary font-bold">SRS</h2>
        </div>
      </ng-template>
      
      <ng-template #item let-item let-root="root">
        <a pRipple [routerLink]="item.routerLink" class="flex items-center p-menubar-item-link px-4 py-3 cursor-pointer gap-2">
          <i [ngClass]="item.icon"></i>
          <span>{{ item.label }}</span>
          <p-badge *ngIf="item.badge" [ngClass]="{ 'ml-auto': !root }" [value]="item.badge" />
          <span *ngIf="item.shortcut" class="ml-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1">{{ item.shortcut }}</span>
          <i *ngIf="item.items" [ngClass]="['ml-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"></i>
        </a>
      </ng-template>
      
      <ng-template #end>
        <div class="flex items-center gap-3">
          <p-button [icon]="isDarkMode ? 'pi pi-sun' : 'pi pi-moon'" (onClick)="toggleTheme()" [rounded]="true" [text]="true" severity="secondary"></p-button>
          <p-button icon="pi pi-sign-out" (onClick)="logout()" [rounded]="true" [text]="true" severity="danger" label="Logout"></p-button>
        </div>
      </ng-template>
    </p-menubar>
  </div>

  <div class="layout-main-content p-4">
    <router-outlet></router-outlet>
  </div>
</div>
