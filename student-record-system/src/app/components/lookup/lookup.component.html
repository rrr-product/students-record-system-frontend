<div class="grid">
  <div class="col-12">
    <p-card header="Mentors Lookup">
      <div class="flex gap-3 mb-4">
        <input type="text" pInputText [(ngModel)]="newMentorName" placeholder="Mentor Name" class="w-full sm:w-auto" />
        <p-button label="Add Mentor" icon="pi pi-plus" (onClick)="addMentor()" [disabled]="!newMentorName"></p-button>
      </div>
      
      <p-table [value]="mentors" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-mentor>
          <tr>
            <td>{{mentor.id}}</td>
            <td>{{mentor.name}}</td>
            <td>
              <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (onClick)="deleteMentor(mentor.id)"></p-button>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3" class="text-center p-4">No mentors found. Add some mentors to use in classes.</td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</div>
