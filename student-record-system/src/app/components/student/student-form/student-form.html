<div class="row">
  <div class="col-12">
    <p-card [header]="isEditing ? 'Edit Student' : 'Add Student'">
      <div class="d-flex flex-column gap-3 mt-3">
        <div class="row">
          <div class="col-12 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Name</label>
            <input type="text" pInputText [(ngModel)]="currentStudent.name" class="w-100" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Register No</label>
            <input type="text" pInputText [(ngModel)]="currentStudent.registerNo" class="w-100" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Email</label>
            <input type="email" pInputText [(ngModel)]="currentStudent.email" class="w-100" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Department</label>
            <input type="text" pInputText [(ngModel)]="currentStudent.department" class="w-100" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Class (Section)</label>
            <p-select [options]="classes" [(ngModel)]="currentStudent.classId" optionLabel="section" optionValue="id" placeholder="Select Class" styleClass="w-100"></p-select>
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-end gap-2 mt-4">
        <p-button label="Cancel" icon="pi pi-times" (onClick)="cancel()" severity="secondary" [text]="true"></p-button>
        <p-button label="Save" icon="pi pi-check" (onClick)="saveStudent()" [disabled]="!isFormValid()"></p-button>
      </div>
    </p-card>
  </div>
</div>
