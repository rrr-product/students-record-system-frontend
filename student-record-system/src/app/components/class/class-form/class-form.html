<div class="row">
  <div class="col-12">
    <p-card>
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="fs-4 fw-bold m-0 text-dark">
          <a class="text-decoration-none text-primary" routerLink="/classes">Classes</a>
          <span class="text-secondary fw-normal fs-5"> :: {{ isEditing ? 'Edit' : 'Create' }}</span>
        </h2>
        <div class="d-flex align-items-center gap-2">
          <p-button label="Save" icon="pi pi-check" size="small" (onClick)="saveClass()"
            [disabled]="!isFormValid()"></p-button>
        </div>
      </div>
      <div class="d-flex flex-column gap-3 mt-3">
        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Section</label>
            <input type="text" pInputText [(ngModel)]="currentClass.section" class="w-100" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Room No</label>
            <input type="text" pInputText [(ngModel)]="currentClass.roomNo" class="w-100" />
          </div>
          <div class="col-12 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Class Coordinator</label>
            <input type="text" pInputText [(ngModel)]="currentClass.coordinator" class="w-100" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Mentor One</label>
            <p-select [options]="mentors" [(ngModel)]="currentClass.mentorOne" optionLabel="name"
              placeholder="Select a Mentor" styleClass="w-100"></p-select>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Mentor Two</label>
            <p-select [options]="mentors" [(ngModel)]="currentClass.mentorTwo" optionLabel="name"
              placeholder="Select a Mentor" styleClass="w-100"></p-select>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Mentor Three</label>
            <p-select [options]="mentors" [(ngModel)]="currentClass.mentorThree" optionLabel="name"
              placeholder="Select a Mentor" styleClass="w-100"></p-select>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Class Started At</label>
            <p-datepicker [(ngModel)]="startedAtTime" [timeOnly]="true" hourFormat="12"
              styleClass="w-100"></p-datepicker>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="d-block text-dark fw-medium mb-2">Class Ends At</label>
            <p-datepicker [(ngModel)]="endsAtTime" [timeOnly]="true" hourFormat="12" styleClass="w-100"></p-datepicker>
          </div>
        </div>
      </div>

    </p-card>
  </div>
</div>
