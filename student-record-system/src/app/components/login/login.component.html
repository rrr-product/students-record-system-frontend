<div class="d-flex min-vh-100 align-items-center justify-content-center" style="background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);">
  <p-card header="Student Record System" subheader="Sign in to continue"
    [style]="{ width: '100%', maxWidth: '420px', margin: '0 1rem' }">
    <div class="d-flex flex-column gap-4">
      <div>
        <label for="userId" class="d-block text-secondary fw-medium small mb-2">User ID</label>
        <input id="userId" type="text" pInputText [(ngModel)]="userId" class="w-100" />
      </div>
      <div>
        <label for="password" class="d-block text-secondary fw-medium small mb-2">Password</label>
        <p-password id="password" [(ngModel)]="password" [feedback]="false" class="w-100"
          inputStyleClass="w-100"></p-password>
      </div>
      <div *ngIf="error" class="mb-3 text-danger small">
        {{ error }}
      </div>
      <div style="display: flex; justify-content: flex-start; margin-top: 2rem;">
        <p-button label="Login" icon="pi pi-user" (onClick)="login()" size="small"></p-button>
      </div>
    </div>
  </p-card>
</div>
