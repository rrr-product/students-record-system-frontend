<div class="login-wrapper">
  <p-card header="Student Record System" subheader="Sign in to continue" [style]="{ width: '400px' }">
    <div class="flex flex-col gap-4">
      <div class="field">
        <label for="userId" class="block text-900 font-medium mb-2">User ID</label>
        <input id="userId" type="text" pInputText [(ngModel)]="userId" class="w-full" />
      </div>
      <div class="field">
        <label for="password" class="block text-900 font-medium mb-2">Password</label>
        <p-password id="password" [(ngModel)]="password" [feedback]="false" styleClass="w-full" inputStyleClass="w-full"></p-password>
      </div>
      <div *ngIf="error" class="mb-3 text-red-500 text-sm">
        {{ error }}
      </div>
      <p-button label="Sign In" icon="pi pi-user" (onClick)="login()" class="w-full"></p-button>
    </div>
  </p-card>
</div>
