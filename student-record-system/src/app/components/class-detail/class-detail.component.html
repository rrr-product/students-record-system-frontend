<div class="grid">
  <div class="col-12">
    <p-card header="Class Details">
      <div class="flex justify-content-end mb-3">
        <p-button label="Add Class" icon="pi pi-plus" (onClick)="showDialog()"></p-button>
      </div>
      
      <p-table [value]="classes" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
          <tr>
            <th>Section</th>
            <th>Room No</th>
            <th>Coordinator</th>
            <th>Mentors</th>
            <th>Timings</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-cls>
          <tr>
            <td>{{cls.section}}</td>
            <td>{{cls.roomNo}}</td>
            <td>{{cls.coordinator}}</td>
            <td>
              <div class="text-sm">1. {{cls.mentorOne?.name || 'N/A'}}</div>
              <div class="text-sm">2. {{cls.mentorTwo?.name || 'N/A'}}</div>
              <div class="text-sm">3. {{cls.mentorThree?.name || 'N/A'}}</div>
            </td>
            <td>
              {{formatTime(cls.classStartedAt)}} - {{formatTime(cls.classEndsAt)}}
            </td>
            <td>
              <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" (onClick)="editClass(cls)"></p-button>
              <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="deleteClass(cls.id)"></p-button>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6" class="text-center p-4">No classes found.</td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</div>

<p-dialog [(visible)]="displayDialog" [header]="isEditing ? 'Edit Class' : 'Add Class'" [modal]="true" [style]="{ width: '50vw' }" [breakpoints]="{'960px': '75vw', '640px': '90vw'}">
  <div class="flex flex-col gap-3 mt-3">
    <div class="grid formgrid">
      <div class="col-12 md:col-6 field">
        <label class="block text-900 font-medium mb-2">Section</label>
        <input type="text" pInputText [(ngModel)]="currentClass.section" class="w-full" />
      </div>
      <div class="col-12 md:col-6 field">
        <label class="block text-900 font-medium mb-2">Room No</label>
        <input type="text" pInputText [(ngModel)]="currentClass.roomNo" class="w-full" />
      </div>
      <div class="col-12 field">
        <label class="block text-900 font-medium mb-2">Class Coordinator</label>
        <input type="text" pInputText [(ngModel)]="currentClass.coordinator" class="w-full" />
      </div>
      <div class="col-12 md:col-4 field">
        <label class="block text-900 font-medium mb-2">Mentor One</label>
        <p-select [options]="mentors" [(ngModel)]="currentClass.mentorOne" optionLabel="name" placeholder="Select a Mentor" styleClass="w-full"></p-select>
      </div>
      <div class="col-12 md:col-4 field">
        <label class="block text-900 font-medium mb-2">Mentor Two</label>
        <p-select [options]="mentors" [(ngModel)]="currentClass.mentorTwo" optionLabel="name" placeholder="Select a Mentor" styleClass="w-full"></p-select>
      </div>
      <div class="col-12 md:col-4 field">
        <label class="block text-900 font-medium mb-2">Mentor Three</label>
        <p-select [options]="mentors" [(ngModel)]="currentClass.mentorThree" optionLabel="name" placeholder="Select a Mentor" styleClass="w-full"></p-select>
      </div>
      <div class="col-12 md:col-6 field">
        <label class="block text-900 font-medium mb-2">Class Started At</label>
        <p-datepicker [(ngModel)]="startedAtTime" [timeOnly]="true" hourFormat="12" styleClass="w-full"></p-datepicker>
      </div>
      <div class="col-12 md:col-6 field">
        <label class="block text-900 font-medium mb-2">Class Ends At</label>
        <p-datepicker [(ngModel)]="endsAtTime" [timeOnly]="true" hourFormat="12" styleClass="w-full"></p-datepicker>
      </div>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" icon="pi pi-times" (onClick)="hideDialog()" severity="secondary" [text]="true"></p-button>
    <p-button label="Save" icon="pi pi-check" (onClick)="saveClass()" [disabled]="!isFormValid()"></p-button>
  </ng-template>
</p-dialog>
